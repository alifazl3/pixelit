name: Deploy Marburg Tech

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: marburg-tech-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality checks
        run: |
          pnpm lint
          pnpm typecheck
          pnpm build

      - name: Prepare SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ] || [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "Missing required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY"
            exit 1
          fi

          PORT="${DEPLOY_PORT:-22}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "${DEPLOY_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          if [ -n "${DEPLOY_KNOWN_HOSTS}" ]; then
            printf "%s\n" "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Sync files to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"

          RSYNC_RSH="ssh -p ${PORT} -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=10 -o ConnectionAttempts=3"
          export RSYNC_RSH

          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.next' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/marburg-tech-app/"

      - name: Build and restart on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"

          ssh -p "${PORT}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=10 \
            -o ConnectionAttempts=3 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" <<'REMOTE'
          set -euo pipefail

          APP_DIR="/opt/marburg-tech-app"
          SERVICE="marburg-tech.service"

          cd "${APP_DIR}"
          corepack enable
          corepack pnpm install --frozen-lockfile
          corepack pnpm build
          systemctl restart "${SERVICE}"

          # Wait for service to become healthy after restart.
          attempts=30
          until systemctl is-active --quiet "${SERVICE}" && curl -fsS http://127.0.0.1:3100/ > /dev/null; do
            attempts=$((attempts - 1))
            if [ "${attempts}" -le 0 ]; then
              echo "Service did not become healthy in time"
              systemctl status "${SERVICE}" --no-pager -n 80 || true
              exit 1
            fi
            sleep 1
          done
          REMOTE
